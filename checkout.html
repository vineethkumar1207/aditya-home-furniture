<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Aditya Home Furniture</title>
    <meta name="description" content="Secure checkout.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="assets/styles.css">
    <script src="assets/scripts.js" defer></script>
</head>
<body id="checkout-page" style="background-color: var(--bg-color);">

    <!-- Header -->
    <header class="header">
        <div class="container header-content" style="justify-content: center;">
            <a href="index.html" class="logo">ADITYA HOME</a>
        </div>
    </header>

    <main style="padding-top: 100px; min-height: 80vh;">
        
        <div class="container section">
            
            <div class="grid-2 fade-up" style="gap: var(--spacing-xl); grid-template-columns: 2fr 1fr; align-items: start;">
                
                <!-- Checkout Form -->
                <div>
                    <h2 style="margin-bottom: var(--spacing-md);">Checkout</h2>
                    
                    <form action="#" method="POST">
                        <!-- Contact Info -->
                        <h3 style="margin-bottom: 0.5rem; font-family: var(--font-body); font-size: 1.1rem;">Contact Information</h3>
                        <div class="form-group">
                            <input type="email" id="email" name="email" class="form-control" placeholder="Email address" required>
                        </div>
                        <div class="form-group" style="margin-bottom: var(--spacing-md);">
                            <input type="tel" id="phone" name="phone" class="form-control" placeholder="Phone number" required>
                        </div>

                        <!-- Shipping Address -->
                        <h3 style="margin-bottom: 0.5rem; font-family: var(--font-body); font-size: 1.1rem;">Shipping Address</h3>
                        <div class="grid-2" style="gap: 1rem;">
                            <div class="form-group">
                                <input type="text" id="fname" name="fname" class="form-control" placeholder="First name" required>
                            </div>
                            <div class="form-group">
                                <input type="text" id="lname" name="lname" class="form-control" placeholder="Last name" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <input type="text" id="address" name="address" class="form-control" placeholder="Street address" required>
                        </div>
                        <div class="grid-3" style="gap: 1rem;">
                            <div class="form-group">
                                <input type="text" id="city" name="city" class="form-control" placeholder="City" required>
                            </div>
                            <div class="form-group">
                                <select id="state" name="state" class="form-control" required>
                                    <option value="">State / Province</option>
                                    <option value="TS">Telangana</option>
                                    <option value="KA">Karnataka</option>
                                    <option value="TN">Tamil Nadu</option>
                                    <option value="MH">Maharashtra</option>
                                    <option value="DL">Delhi</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="text" id="zip" name="zip" class="form-control" placeholder="PIN code" required>
                            </div>
                        </div>
                        
                        <!-- Payment Details -->
                        <h3 style="margin-top: 1rem; margin-bottom: 0.5rem; font-family: var(--font-body); font-size: 1.1rem;">Payment Details</h3>
                        <div class="form-group" style="margin-bottom: var(--spacing-sm);">
                            <input type="text" id="ccnum" name="ccnum" class="form-control" placeholder="Card Number (xxxx xxxx xxxx xxxx)" required>
                        </div>
                        <div class="grid-2" style="gap: 1rem;">
                            <div class="form-group">
                                <input type="text" id="ccexp" name="ccexp" class="form-control" placeholder="Expiry (MM/YY)" required>
                            </div>
                            <div class="form-group">
                                <input type="text" id="cvv" name="cvv" class="form-control" placeholder="CVV" required>
                            </div>
                        </div>

                        <div style="margin: var(--spacing-md) 0;">
                            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem;">Complete Order</button>
                        </div>
                    </form>
                </div>

                <!-- Order Summary -->
                <div style="background-color: var(--surface-color); border: 1px solid var(--oak-300); padding: var(--spacing-md); border-radius: var(--radius-md);">
                    <h3 style="margin-bottom: 1rem; font-family: var(--font-body); font-size: 1.1rem;">Order Summary</h3>
                    
                    <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                        <img src="https://images.unsplash.com/photo-1604578762246-41134e37f9cc?auto=format&fit=crop&w=100&q=80" alt="Classic European Oak Dining Table" style="width: 60px; height: 60px; object-fit: cover; border-radius: var(--radius-sm); border: 1px solid var(--oak-50);">
                        <div style="flex-grow: 1; display: flex; justify-content: space-between;">
                            <div>
                                <span style="font-weight: 500; font-size: 0.95rem; display: block;">Classic European Oak Dining Table</span>
                                <span class="text-muted" style="font-size: 0.85rem;">72" (Seats 6)</span>
                            </div>
                            <span style="font-weight: 500;">₹1,95,000</span>
                        </div>
                    </div>
                    
                    <div style="border-top: 1px solid var(--oak-50); padding-top: 1rem; margin-top: 1rem;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem; color: var(--muted); font-size: 0.95rem;">
                            <span>Subtotal</span>
                            <span id="checkout-subtotal">₹0</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; margin-bottom: 1rem; color: var(--muted); font-size: 0.95rem;">
                            <span>Shipping (White-Glove)</span>
                            <span>Free</span>
                        </div>
                        
                        <div style="display: flex; justify-content: space-between; font-weight: 600; font-size: 1.2rem; color: var(--text-primary); border-top: 1px solid var(--oak-300); padding-top: 1rem;">
                            <span>Total</span>
                            <span id="checkout-total">₹0</span>
                        </div>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="footer" style="margin-top: 0;">
        <div class="container footer-bottom">
            <p>&copy; 2026 Aditya Home Furniture. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
